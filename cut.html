<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutlet Menu - Selection</title>
    <link rel="stylesheet" href="cut.css">
</head>
<body>

<header>

    <a href="main.html" class="back-btn">← Back to Home</a>
    <h1>Elite Dine In</h1>
    
</header>

<div class="menu-container">
    <!-- Veg Cutlet Section -->
    <div class="dropdown-section veg-theme">
        <label for="veg-cutlets">🟢 Select Veg Cutlet:</label>
        <select id="veg-cutlets">
            <option value="" disabled selected>-- Choose a Veg Cutlet --</option>
            <option value="120">Classic Vegetable Cutlet — ₹120</option>
            <option value="150">Paneer Spiced Cutlet — ₹150</option>
            <option value="140">Beetroot & Peanut Cutlet — ₹140</option>
            <option value="160">Corn & Cheese Cutlet — ₹160</option>
            <option value="110">Aloo Tikki Cutlet — ₹110</option>
            <option value="170">Mushroom & Garlic Cutlet — ₹170</option>
            <option value="155">Spinach & Corn Cutlet — ₹155</option>
            <option value="145">Soya Keema Cutlet — ₹145</option>
            <option value="130">Sweet Potato Cutlet — ₹130</option>
            <option value="180">Cheese Stuffed Veg Cutlet — ₹180</option>
        </select>
    </div>

    <!-- Non-Veg Cutlet Section -->
    <div class="dropdown-section non-veg-theme">
        <label for="non-veg-cutlets">🔴 Select Non-Veg Cutlet:</label>
        <select id="non-veg-cutlets">
            <option value="" disabled selected>-- Choose a Non-Veg Cutlet --</option>
            <option value="190">Crispy Chicken Cutlet — ₹190</option>
            <option value="240">Spiced Mutton Cutlet — ₹240</option>
            <option value="220">Traditional Fish Cutlet — ₹220</option>
            <option value="260">Prawn Pepper Cutlet — ₹260</option>
            <option value="150">Egg & Potato Cutlet — ₹150</option>
            <option value="210">Cheesy Chicken Cutlet — ₹210</option>
            <option value="230">Chicken Keema Cutlet — ₹230</option>
            <option value="280">Crab Meat Cutlet — ₹280</option>
            <option value="200">Tandoori Chicken Cutlet — ₹200</option>
            <option value="250">Mutton Shami Cutlet — ₹250</option>
        </select>
    </div>
</div>

</body>
</html>
